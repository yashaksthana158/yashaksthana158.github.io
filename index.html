<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google-site-verification" content="87Ye0O8wyW7n-7pczsY2aaqUTRT-nfUh3ACLFXQjX9I" />
  <title>RAG Chat — AI Research Assistant</title>

  <!-- PASTE YOUR GOOGLE VERIFICATION META TAG HERE -->
  <!-- <meta name="google-site-verification" content="YOUR_CODE_HERE"> -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0f14;
      color: #a1a1aa;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .card {
      max-width: 480px; width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 3rem 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 32px 64px rgba(0,0,0,.5);
    }
    .mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      font-size: 24px; color: #fff;
      box-shadow: 0 8px 24px rgba(99,102,241,.4);
      margin-bottom: 1.2rem;
    }
    h1 {
      color: #f4f4f5; font-size: 1.9rem; font-weight: 700;
      letter-spacing: -.5px; margin-bottom: .5rem;
    }
    .sub {
      font-size: 14px; color: #71717a; margin-bottom: 2rem; line-height: 1.6;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff; text-decoration: none;
      font-size: 14px; font-weight: 600;
      padding: 12px 28px; border-radius: 10px;
      box-shadow: 0 4px 16px rgba(99,102,241,.35);
      transition: opacity .2s;
      margin-bottom: 2rem;
    }
    .btn:hover { opacity: .88; }
    .features {
      display: flex; gap: 10px; justify-content: center;
      flex-wrap: wrap; margin-bottom: 2rem;
    }
    .tag {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px; padding: 5px 14px;
      font-size: 12.5px; color: #71717a;
    }
    .divider {
      border: none; border-top: 1px solid rgba(255,255,255,.07);
      margin: 0 0 1.2rem;
    }
    .legal {
      display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    }
    .legal a {
      color: #52525b; font-size: 12.5px; text-decoration: none;
      transition: color .2s;
    }
    .legal a:hover { color: #a1a1aa; }
    .privacy-link {
      color: #6366f1 !important;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">✦</div>
    <h1>RAG Chat</h1>
    <p class="sub">An AI-powered research assistant. Ask questions, upload documents,<br>and get cited answers in real time.</p>
    <a class="btn" href="https://academic-ragchat.streamlit.app">Open App →</a>
    <div class="features">
      <span class="tag">Document Q&amp;A</span>
      <span class="tag">Web Search</span>
      <span class="tag">Chat History</span>
      <span class="tag">RAG</span>
    </div>
    <hr class="divider">
    <nav class="legal">
      <a href="https://yashaksthana158.github.io/privacy.html" class="privacy-link">Privacy Policy</a>
      <a href="https://yashaksthana158.github.io/terms.html">Terms of Service</a>
      <a href="mailto:csresearch@andc.du.ac.in">Contact</a>
    </nav>
  </div>
</body>
</html>
